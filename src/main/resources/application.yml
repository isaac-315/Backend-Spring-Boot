spring:
  application:
    name: proyectoFinal
  config:
    import: optional:file:.env[.properties]  

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate      # obligatorio: Hibernate NO crea/modifica el esquema
    open-in-view: false       # exigido explícitamente en la guía
    properties:
      hibernate:
        format_sql: true

  #flyway:
    #enabled: true
    #locations: classpath:db/migration
    #baseline-on-migrate: false

  #data:
    #redis:
      #host: ${REDIS_HOST}
      #port: ${REDIS_PORT}
      #password: ${REDIS_PASSWORD}

server:
  port: ${PORT:8080}

#jwt:
  #secret: ${JWT_SECRET}
  #access-expiration: ${JWT_ACCESS_EXPIRATION}
  #refresh-expiration: ${JWT_REFRESH_EXPIRATION}

#cors:
  #allowed-origins: ${ALLOWED_ORIGINS}

#springdoc:
  #swagger-ui:
    #path: /swagger-ui.html
  #api-docs:
    #path: /v3/api-docs

#management:
  #endpoints:
    #web:
      #exposure:
        #include: health        # solo health público, nada más
  #endpoint:
    #health:
      #show-details: never

app:
  timezone: America/Guayaquil